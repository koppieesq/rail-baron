# DO NOT fill in real values here — this file is committed to git.
# Copy to secret.yaml, fill in real values, then run:
#
#   kubectl apply -f k8s/secret.yaml
#
# secret.yaml is gitignored.

apiVersion: v1
kind: Secret
metadata:
  name: rail-baron-secrets
type: Opaque
stringData:
  db-host: "your-db-host.db.ondigitalocean.com"
  db-port: "25060"
  db-name: "defaultdb"
  db-user: "doadmin"
  db-password: "your-password-here"
  drupal-hash-salt: "generate-with-drush-php-eval"
  google-client-id: "your-client-id.apps.googleusercontent.com"
  # Paste the full contents of the CA cert DO provides for your managed DB
  db-ca-cert: |
    -----BEGIN CERTIFICATE-----
    ...
    -----END CERTIFICATE-----
