user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    error_log /dev/stderr warn;
    access_log /dev/stdout;

    # -------------------------------------------------------
    # Drupal backend — port 80
    # -------------------------------------------------------
    server {
        listen 80 default_server;

        root /var/www/html/backend/web;
        index index.php index.html;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;

        location / {
            absolute_redirect off;
            try_files $uri $uri/ /index.php?$query_string;
        }

        location @rewrite {
            rewrite ^ /index.php;
        }

        location ~ ^/sites/.*/files/styles/ {
            try_files $uri @rewrite;
        }

        location ~ ^/jsonapi {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ '\.php$|^/update.php' {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_intercept_errors off;
            fastcgi_read_timeout 10m;
            fastcgi_param SERVER_NAME $host;
        }

        location ~* /\.(?!well-known\/) { deny all; }
        location ~* (?:\.(?:bak|conf|dist|fla|in[ci]|log|psd|sh|sql|sw[op])|~)$ { deny all; }

        location ^~ /system/files/ {
            log_not_found off;
            access_log off;
            expires 30d;
            try_files $uri @rewrite;
        }

        location ~* \.(jpg|jpeg|gif|png|ico|svg|webp|mp4|ogg|webm)$ {
            try_files $uri @rewrite;
            expires max;
            log_not_found off;
        }

        location ~* \.(js|css)$ {
            try_files $uri @rewrite;
            expires -1;
            log_not_found off;
        }
    }

    # -------------------------------------------------------
    # React frontend — port 3000
    # -------------------------------------------------------
    server {
        listen 3000 default_server;

        root /var/www/html/frontend;
        index index.html;

        # React Router — always fall back to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static assets get a long cache (CRA names them with content hashes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }

        # Never cache index.html itself
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store";
        }
    }
}
