<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 56">
  <!-- Steam puffs -->
  <circle cx="16" cy="6" r="5" fill="#ccc" opacity="0.75"/>
  <circle cx="24" cy="3" r="3.5" fill="#ccc" opacity="0.55"/>
  <circle cx="30" cy="5" r="2.5" fill="#ccc" opacity="0.4"/>

  <!-- Smokestack (tall, flared cap) -->
  <rect x="12" y="11" width="8" height="17" fill="#2a2a2a"/>
  <rect x="9" y="8" width="14" height="6" rx="2" fill="#2a2a2a"/>

  <!-- Boiler (large rounded cylinder) -->
  <rect x="8" y="24" width="44" height="16" rx="9" fill="#4a4a4a"/>

  <!-- Steam dome on top of boiler -->
  <ellipse cx="30" cy="23" rx="7" ry="5" fill="#5a5a5a"/>

  <!-- Bell (gold) -->
  <circle cx="42" cy="23" r="3.5" fill="#c8a000"/>

  <!-- Cab body -->
  <rect x="48" y="16" width="13" height="24" rx="1" fill="#333"/>
  <!-- Cab roof -->
  <rect x="46" y="13" width="17" height="5" rx="1" fill="#222"/>
  <!-- Cab window -->
  <rect x="51" y="20" width="5" height="8" rx="1" fill="#7ab8d4"/>

  <!-- Running board / frame -->
  <rect x="6" y="38" width="54" height="3" fill="#222"/>

  <!-- Cowcatcher (front) -->
  <polygon points="4,41 10,41 7,51" fill="#333"/>

  <!-- Drive wheel 1 (large) -->
  <circle cx="21" cy="47" r="8" fill="#1a1a1a"/>
  <circle cx="21" cy="47" r="3" fill="#555"/>

  <!-- Drive wheel 2 (large) -->
  <circle cx="38" cy="47" r="8" fill="#1a1a1a"/>
  <circle cx="38" cy="47" r="3" fill="#555"/>

  <!-- Front pilot wheel (small) -->
  <circle cx="8" cy="49" r="5" fill="#1a1a1a"/>
  <circle cx="8" cy="49" r="1.8" fill="#555"/>

  <!-- Rear trailing wheel (small) -->
  <circle cx="55" cy="49" r="5" fill="#1a1a1a"/>
  <circle cx="55" cy="49" r="1.8" fill="#555"/>

  <!-- Red connecting rod -->
  <rect x="17" y="45" width="26" height="3" rx="1.5" fill="#cc0022"/>

  <!-- Headlight -->
  <circle cx="7" cy="32" r="3.5" fill="#ffe966"/>
</svg>
