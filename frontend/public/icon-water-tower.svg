<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72">
  <!-- Tank (barrel shape, wider in middle) -->
  <path d="M13,8 Q13,3 32,3 Q51,3 51,8 L55,33 Q55,42 32,42 Q9,42 9,33 Z" fill="#8B5E2C"/>

  <!-- Tank bands (horizontal rings) -->
  <ellipse cx="32" cy="33" rx="23" ry="5" fill="#7a5020"/>
  <path d="M10,20 Q10,18 32,18 Q54,18 54,20" stroke="#7a5020" stroke-width="2.5" fill="none"/>
  <path d="M12,28 Q12,26 32,26 Q52,26 52,28" stroke="#7a5020" stroke-width="2" fill="none"/>

  <!-- Tank top cap -->
  <ellipse cx="32" cy="8" rx="19" ry="5" fill="#a06e3a"/>

  <!-- Legs (3, forming A-shape) -->
  <line x1="20" y1="40" x2="14" y2="67" stroke="#6a4018" stroke-width="5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="67" stroke="#6a4018" stroke-width="5" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="50" y2="67" stroke="#6a4018" stroke-width="5" stroke-linecap="round"/>

  <!-- Cross bracing -->
  <line x1="17" y1="48" x2="47" y2="61" stroke="#6a4018" stroke-width="2.5"/>
  <line x1="47" y1="48" x2="17" y2="61" stroke="#6a4018" stroke-width="2.5"/>

  <!-- Base platform -->
  <rect x="10" y="67" width="44" height="5" rx="2" fill="#6a4018"/>

  <!-- Boom arm (prominent, extends right from tank) -->
  <line x1="30" y1="18" x2="62" y2="10" stroke="#5a3410" stroke-width="4" stroke-linecap="round"/>

  <!-- Pivot cap where boom meets tank -->
  <circle cx="30" cy="18" r="4" fill="#5a3410"/>

  <!-- Spout pipe (hangs down from boom end) -->
  <line x1="62" y1="10" x2="62" y2="32" stroke="#5a3410" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Spout curved end -->
  <path d="M58,30 Q62,36 66,30" stroke="#5a3410" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Water drop -->
  <ellipse cx="62" cy="39" rx="3" ry="4" fill="#5599cc" opacity="0.8"/>
</svg>
