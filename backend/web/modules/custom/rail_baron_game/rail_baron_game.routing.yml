# All game routes require an authenticated user.
# Authentication is handled by Drupal's pluggable auth system:
#   - oauth2:      Authorization: Bearer <jwt>  (Simple OAuth — primary for the React SPA)
#   - basic_auth:  Authorization: Basic ...     (kept for transition / dev; remove after cutover)
#   - cookie:      Drupal session cookie
#
# The _auth option activates non-global providers (basic_auth, oauth2) on custom routes.

# ---------------------------------------------------------------------------
# Google OAuth token exchange (anonymous — credential is the authentication)
# ---------------------------------------------------------------------------

rail_baron_game.google_auth:
  path: '/api/auth/google'
  methods: [POST]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GoogleAuthController::exchange'
    _title: 'Google OAuth Token Exchange'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

# ---------------------------------------------------------------------------
# Game lifecycle (Phase 2)
# ---------------------------------------------------------------------------

rail_baron_game.list_open:
  path: '/api/games/open'
  methods: [GET]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GameController::listOpen'
    _title: 'List Open Games'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'

rail_baron_game.create:
  path: '/api/game'
  methods: [POST]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GameController::createGame'
    _title: 'Create Game'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'

rail_baron_game.find:
  path: '/api/game/find/{join_code}'
  methods: [GET]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GameController::find'
    _title: 'Find Game by Join Code'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'

rail_baron_game.state:
  path: '/api/game/{game_id}/state'
  methods: [GET]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GameController::getState'
    _title: 'Game State'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'
    game_id: '\d+'

rail_baron_game.join:
  path: '/api/game/{game_id}/join'
  methods: [POST]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GameController::join'
    _title: 'Join Game'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'
    game_id: '\d+'

rail_baron_game.start:
  path: '/api/game/{game_id}/start'
  methods: [POST]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\GameController::start'
    _title: 'Start Game'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'
    game_id: '\d+'

rail_baron_game.update_player:
  path: '/api/game/{game_id}/player'
  methods: [PATCH]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\PlayerController::update'
    _title: 'Update Player State'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'
    game_id: '\d+'

# ---------------------------------------------------------------------------
# Turn actions (Phase 3)
# ---------------------------------------------------------------------------

rail_baron_game.roll_destination:
