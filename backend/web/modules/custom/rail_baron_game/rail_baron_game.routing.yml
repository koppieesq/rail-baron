rail_baron_game.move:
  path: '/api/game/{game_id}/move'
  methods: [POST]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\TurnController::executeMove'
    _title: 'Execute Move'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'
    game_id: '\d+'

rail_baron_game.purchase:
  path: '/api/game/{game_id}/purchase'
  methods: [POST]
  defaults:
    _controller: '\Drupal\rail_baron_game\Controller\TurnController::executePurchase'
    _title: 'Purchase Railroad or Train Upgrade'
  options:
    _auth: ['oauth2', 'basic_auth', 'cookie']
  requirements:
    _user_is_logged_in: 'TRUE'
    game_id: '\d+'
