services:
  rail_baron_game.game_manager:
    class: Drupal\rail_baron_game\GameManager
    arguments:
      - '@database'
      - '@current_user'
      - '@datetime.time'

  rail_baron_game.data_loader:
    class: Drupal\rail_baron_game\DataLoader

  rail_baron_game.movement_service:
    class: Drupal\rail_baron_game\Service\MovementService
    arguments:
      - '@rail_baron_game.data_loader'

  rail_baron_game.turn_manager:
    class: Drupal\rail_baron_game\TurnManager
    arguments:
      - '@database'
      - '@rail_baron_game.game_manager'
      - '@current_user'
      - '@rail_baron_game.data_loader'
      - '@rail_baron_game.movement_service'
      - '@datetime.time'

  logger.channel.rail_baron_game:
    parent: logger.channel_base
    arguments: ['rail_baron_game']

  rail_baron_game.ws_notifier:
    class: Drupal\rail_baron_game\WebSocketNotifier
    arguments:
      - '@http_client'
      - '@logger.channel.rail_baron_game'
